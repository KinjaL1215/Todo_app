<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskflow | Premium Task Management App</title>
    <meta name="description" content="Manage your tasks, track your progress, and schedule email reminders with Taskflow, the modern glassmorphic Todo list application.">
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <!-- Background Gradient Blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="app-container">
        <!-- Header Section -->
        <header class="app-header">
            <div class="brand">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 11 12 14 22 4"></polyline>
                        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                    </svg>
                </div>
                <h1>Taskflow</h1>
            </div>
            
            <div class="header-actions">
                <!-- Theme Toggle Button -->
                <button id="theme-toggle" class="icon-btn" aria-label="Toggle light and dark mode">
                    <svg class="sun-icon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="moon-icon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
        </header>
        <!-- Dashboard Statistics -->
        <section class="stats-dashboard" aria-label="Task Statistics">
            <div class="stat-card">
                <span class="stat-label">Total Tasks</span>
                <span id="stat-total" class="stat-value">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Active</span>
                <span id="stat-active" class="stat-value text-blue">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Completed</span>
                <span id="stat-completed" class="stat-value text-green">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Reminders</span>
                <span id="stat-reminders" class="stat-value text-purple">0</span>
            </div>
        </section>
        <!-- Main Content Grid -->
        <main class="main-grid">
            <!-- Left Panel: Create Task Form -->
            <section class="panel glass-panel" aria-labelledby="form-panel-title">
                <h2 id="form-panel-title" class="panel-title">Create New Task</h2>
                <form id="task-form" class="task-form">
                    <div class="form-group">
                        <label for="task-title">What needs to be done?</label>
                        <input type="text" id="task-title" name="title" placeholder="e.g. Finish chemistry project..." required>
                    </div>
                    
                    <div class="form-group">
                        <label for="task-email">Reminder Email (Optional)</label>
                        <input type="email" id="task-email" name="email" placeholder="e.g. yourname@example.com">
                    </div>
                    
                    <div class="form-group">
                        <label for="task-reminder">Reminder Date & Time (Optional)</label>
                        <input type="datetime-local" id="task-reminder" name="reminder_time">
                    </div>
                    
                    <button type="submit" id="add-task-btn" class="btn btn-primary">
                        <span>Add Task</span>
                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                </form>
            </section>
            <!-- Right Panel: Task List & Filters -->
            <section class="panel glass-panel list-panel" aria-labelledby="list-panel-title">
                <div class="panel-header">
                    <h2 id="list-panel-title" class="panel-title">Tasks</h2>
                    <!-- Filters -->
                    <div class="task-filters">
                        <button class="filter-btn active" data-filter="all">All</button>
                        <button class="filter-btn" data-filter="active">Active</button>
                        <button class="filter-btn" data-filter="completed">Completed</button>
                    </div>
                </div>
                <!-- Empty State -->
                <div id="empty-state" class="empty-state">
                    <div class="empty-icon">
                        <svg viewBox="0 0 24 24" width="48" height="48" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="8" x2="12" y2="12"></line>
                            <line x1="12" y1="16" x2="12.01" y2="16"></line>
                        </svg>
                    </div>
                    <p>No tasks found. Create one to get started!</p>
                </div>
                <!-- Task list container -->
                <ul id="tasks-list" class="tasks-list">
                    <!-- Tasks will be injected here dynamically by JavaScript -->
                </ul>
            </section>
        </main>
    </div>
    <!-- Toast Notifications -->
    <div id="toast-container" class="toast-container"></div>
    <!-- Main JavaScript -->
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
